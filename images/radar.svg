<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Radar sweep">
  <defs>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0b1020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0"/>
      <stop offset="60%" stop-color="#5eead4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a7f3d0" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <circle cx="300" cy="300" r="290" fill="url(#rg)"/>
  <g fill="none" stroke="#5eead4" stroke-opacity="0.18" stroke-width="1">
    <circle cx="300" cy="300" r="60"/>
    <circle cx="300" cy="300" r="120"/>
    <circle cx="300" cy="300" r="180"/>
    <circle cx="300" cy="300" r="240"/>
    <circle cx="300" cy="300" r="290"/>
    <line x1="10"  y1="300" x2="590" y2="300"/>
    <line x1="300" y1="10"  x2="300" y2="590"/>
    <line x1="90"  y1="90"  x2="510" y2="510"/>
    <line x1="510" y1="90"  x2="90"  y2="510"/>
  </g>
  <g transform="translate(300 300)">
    <path d="M0 0 L290 0 A290 290 0 0 1 218 192 Z" fill="url(#sg)">
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </path>
    <circle r="3" fill="#5eead4"/>
  </g>
</svg>
